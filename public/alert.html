<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; overflow:hidden; width:1920px; height:1080px; }

#wrap {
  position:fixed; left:0; right:0;
  display:flex; justify-content:center; align-items:flex-end;
  pointer-events:none;
}

/* POSITIONS */
#wrap.bottom-center { bottom:80px; align-items:flex-end; }
#wrap.top-center    { top:80px;    align-items:flex-start; }
#wrap.bottom-left   { bottom:80px; justify-content:flex-start; padding-left:60px; }
#wrap.bottom-right  { bottom:80px; justify-content:flex-end; padding-right:60px; }
#wrap.top-left      { top:80px;    justify-content:flex-start; align-items:flex-start; padding-left:60px; }
#wrap.top-right     { top:80px;    justify-content:flex-end; align-items:flex-start; padding-right:60px; }

#box {
  opacity:0; transform:translateY(40px);
  width:460px; border-radius:16px; overflow:hidden;
  font-family:'Outfit',sans-serif; color:white;
  position:relative;
}

/* DEFAULT STYLE (non-transparent) */
#box.styled {
  background:linear-gradient(145deg,#0c0c20,#1a1030);
  border:2px solid #f59e0b;
  box-shadow:0 0 50px rgba(245,158,11,0.25), 0 20px 60px rgba(0,0,0,0.6);
  padding:20px 24px;
}
/* TRANSPARENT — no background, no border */
#box.transparent-mode {
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
  padding:0;
}

#box.show { animation:popIn .6s cubic-bezier(0.22,1,0.36,1) forwards; }
#box.hide { animation:popOut .4s ease-in forwards; }

@keyframes popIn  { 0%{opacity:0;transform:translateY(50px) scale(.95)} 100%{opacity:1;transform:translateY(0) scale(1)} }
@keyframes popOut { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(30px) scale(.95)} }

/* GLOW (only in styled mode) */
.glow1 { position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; filter:blur(50px); opacity:.25; pointer-events:none; }
.glow2 { position:absolute; bottom:-30px; left:-30px; width:90px; height:90px; background:#8b5cf6; border-radius:50%; filter:blur(40px); opacity:.15; pointer-events:none; }

/* MEDIA */
#media-wrap { width:100%; display:flex; justify-content:center; margin-bottom:12px; }
#media-wrap.media-top    { order:-1; }
#media-wrap.media-bottom { order:10; margin-bottom:0; margin-top:12px; }
#media-wrap img,
#media-wrap video {
  border-radius:10px;
  object-fit:contain;
  max-height:300px;
}

/* TEXT CONTENT */
#text-wrap { text-align:center; position:relative; z-index:1; }
.lbl  { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
.name { font-size:22px; font-weight:800; line-height:1.2; }
.amt  { font-size:40px; font-weight:800; line-height:1.1; margin:4px 0 2px; }
.via  { font-size:10px; color:rgba(255,255,255,0.35); margin-bottom:4px; }
.rmk  { display:none; font-size:13px; color:#ccc; background:rgba(255,255,255,0.08); border-left:3px solid #f59e0b; padding:7px 11px; border-radius:5px; margin-top:10px; font-family:'Kantumruy Pro',sans-serif; word-break:break-word; line-height:1.6; text-align:left; }
.rmk.show { display:block; }

/* Transparent text mode — add text shadow for readability */
#box.transparent-mode .name,
#box.transparent-mode .amt,
#box.transparent-mode .lbl { text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.6); }
#box.transparent-mode .rmk { background:rgba(0,0,0,0.4); border-left-color:#f59e0b; }
</style>
</head>
<body>
<div id="wrap" class="bottom-center">
  <div id="box" class="styled">
    <div class="glow1" id="glow1"></div>
    <div class="glow2"></div>
    <div id="media-wrap" style="display:none"></div>
    <div id="text-wrap">
      <div class="lbl"  id="lbl">🎉 បានបរិច្ចាគ!</div>
      <div class="name" id="name">—</div>
      <div class="amt"  id="amt">$0.00</div>
      <div class="via"  id="via"></div>
      <div class="rmk"  id="rmk"></div>
    </div>
  </div>
</div>

<script>
const socket = io();
const queue  = [];
let showing  = false;
let S = { showName:true, showAmount:true, showRemark:true, showVia:false,
          playSound:true, useDefaultSound:true, customSound:null, soundVolume:100,
          duration:6, accentColor:'#f59e0b', transparent:false,
          mediaFile:null, mediaType:null, mediaPosition:'top', mediaWidth:200,
          alertText:'🎉 បានបរិច្ចាគ!', position:'bottom-center' };

fetch('/api/settings').then(r=>r.json()).then(s=>{ S=s; applyStyle(); });
socket.on('settings_updated', s=>{ S=s; applyStyle(); });
socket.on('donation', d=>{ queue.push(d); if(!showing) showNext(); });

function applyStyle() {
  const box  = document.getElementById('box');
  const wrap = document.getElementById('wrap');
  const c    = S.accentColor || '#f59e0b';

  // Position
  wrap.className = S.position || 'bottom-center';

  // Transparent or styled
  if (S.transparent) {
    box.className = 'transparent-mode';
  } else {
    box.className = 'styled';
    box.style.borderColor = c;
    box.style.boxShadow   = `0 0 50px ${c}40, 0 20px 60px rgba(0,0,0,0.6)`;
    document.getElementById('glow1').style.background = c;
  }
  document.getElementById('lbl').style.color = c;
  document.getElementById('amt').style.color = c;
  document.getElementById('rmk').style.borderLeftColor = c;
}

function showNext() {
  if (!queue.length) { showing=false; return; }
  showing = true;
  const d   = queue.shift();
  const box = document.getElementById('box');

  // Fill text
  document.getElementById('lbl').textContent  = S.alertText || '🎉 បានបរិច្ចាគ!';
  document.getElementById('name').textContent = S.showName   ? (d.donor||'Anonymous') : '';
  document.getElementById('name').style.display = S.showName ? '' : 'none';
  document.getElementById('amt').textContent  = S.showAmount ? `$${parseFloat(d.amount).toFixed(2)}` : '';
  document.getElementById('amt').style.display = S.showAmount ? '' : 'none';

  const viaEl = document.getElementById('via');
  viaEl.textContent   = S.showVia ? `via ${d.via||'ABA PAY'}` : '';
  viaEl.style.display = S.showVia ? '' : 'none';

  const rmkEl = document.getElementById('rmk');
  if (S.showRemark && d.remark) {
    rmkEl.textContent = `💬 ${d.remark}`;
    rmkEl.classList.add('show');
  } else {
    rmkEl.textContent = '';
    rmkEl.classList.remove('show');
  }

  // Media
  const mw = document.getElementById('media-wrap');
  if (S.mediaFile) {
    const w = S.mediaWidth || 200;
    mw.style.display = 'flex';
    mw.className = 'media-wrap media-' + (S.mediaPosition||'top');
    if (S.mediaType === 'video') {
      mw.innerHTML = `<video src="${S.mediaFile}" width="${w}" autoplay loop muted playsinline style="border-radius:10px;max-height:300px;object-fit:contain"></video>`;
    } else {
      mw.innerHTML = `<img src="${S.mediaFile}" width="${w}" style="border-radius:10px;max-height:300px;object-fit:contain">`;
    }
  } else {
    mw.style.display = 'none';
    mw.innerHTML = '';
  }

  applyStyle();
  box.classList.remove('show','hide');
  void box.offsetWidth;
  box.classList.add('show');

  // Sound
  if (S.playSound) {
    try {
      const src = S.customSound && !S.useDefaultSound
        ? S.customSound
        : 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3';
      const audio = new Audio(src); audio.volume = Math.min(1, Math.max(0, (S.soundVolume ?? 100) / 100)); audio.play();
    } catch(e) {}
  }

  const dur   = (S.duration||6) * 1000;
  const extra = (S.showRemark && d.remark) ? 2000 : 0;

  setTimeout(() => {
    box.classList.remove('show');
    box.classList.add('hide');
    setTimeout(() => { box.classList.remove('hide'); setTimeout(showNext,300); }, 450);
  }, dur + extra);
}
</script>
</body>
</html>
